name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to release, for example 0.1.2
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: version-bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          token: ${{ secrets.WANDBMACHINE_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version-file: package.json

      - name: Configure git
        run: |
          git config user.name "wandbmachine"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check tag conflict
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if git rev-parse "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists locally"
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "Tag v$VERSION already exists on origin"
            exit 1
          fi

      - name: Create version bump commit
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          node scripts/release/bump-version.mjs "$VERSION"
          git add src/version.mjs package.json package-lock.json .claude-plugin/plugin.json .claude-plugin/marketplace.json
          git commit -m "chore: bump version to $VERSION"

      - name: Create marketplace sha commit
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          FIRST_COMMIT_SHA="$(git rev-parse HEAD)"
          node scripts/release/update-marketplace-sha.mjs "$FIRST_COMMIT_SHA"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: update marketplace sha for v$VERSION"

      - name: Create release tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          git tag "v$VERSION"

      - name: Push commits and tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "v$VERSION"
