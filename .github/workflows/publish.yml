name: Publish Package

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref to publish, for example v0.1.2
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.inputs.release_ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803  # v6
        with:
          ref: ${{ github.event.inputs.release_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release tag and version
        env:
          RELEASE_REF: ${{ github.event.inputs.release_ref }}
        run: |
          set -euo pipefail

          if ! git rev-parse -q --verify "refs/tags/${RELEASE_REF}" >/dev/null; then
            echo "::error::release_ref must be an existing tag, got '${RELEASE_REF}'"
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"

          if [ "${RELEASE_REF}" != "v${PACKAGE_VERSION}" ]; then
            echo "::error::Tag ${RELEASE_REF} does not match package.json version v${PACKAGE_VERSION}"
            exit 1
          fi

          if npm view "weave-claude-code@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "::error::Version ${PACKAGE_VERSION} is already published to npm"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38  # v6
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance
